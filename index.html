<!DOCTYPE html>
<html lang="en">

    <head>

        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Ian's Number Cruncher</title>

        <!-- CSS -->
        <link rel="stylesheet" href="http://fonts.googleapis.com/css?family=Roboto:400,100,300,500">
        <link rel="stylesheet" href="bootstrap/css/bootstrap.min.css">
        <link rel="stylesheet" href="font-awesome/css/font-awesome.min.css">
		<link rel="stylesheet" href="css/form-elements.css">
        <link rel="stylesheet" href="css/style.css">

        <!-- Favicon and touch icons -->
        <link rel="shortcut icon" href="assets/ico/favicon.png">
        <link rel="apple-touch-icon-precomposed" sizes="144x144" href="assets/ico/apple-touch-icon-144-precomposed.png">
        <link rel="apple-touch-icon-precomposed" sizes="114x114" href="assets/ico/apple-touch-icon-114-precomposed.png">
        <link rel="apple-touch-icon-precomposed" sizes="72x72" href="assets/ico/apple-touch-icon-72-precomposed.png">
        <link rel="apple-touch-icon-precomposed" href="assets/ico/apple-touch-icon-57-precomposed.png">

    </head>

    <body>

        <!-- Top content -->
        <div class="top-content">
        	<div class="container">
                <div class="row">
                    <div class="col-sm-8 col-sm-offset-2 text">
                        <h1>Welcome to the Number Cruncher</h1>
                        <div class="description">
                        	<p>
	                         	Here you will enter three numbers and the number cruncher will calculate
								the largest, smallest and middle number. It will also find the average 
								and the range of the three numbers.
                        	</p>
                        </div>
                    </div>
                </div>
                
                <div class="row">
                    <div class="col-sm-10 col-sm-offset-1 show-forms">
                    	<span class="show-register-form active">Inputs</span> 
                    	<span class="show-forms-divider">/</span> 
                    	<span class="show-login-form" >Results</span>
                    </div>
                </div>
                
                <div class="row register-form">
                    <div class="col-sm-4 col-sm-offset-1">
						<form action="#" class="r-form">
	                    	<div class="form-group">
	                        	<input type="number" placeholder="Number 1..." required id="num1">
							</div>
	                        <div class="form-group">
	                        	<input type="number" placeholder="Number 2..." required id="num2">
	                        </div>
	                        <div class="form-group">
	                        	<input type="number" placeholder="Number 3..." required id="num3">
							</div>
							<div>
								<button type="button" class="btn btn-success show-login-form" id="calc">Calculate</button>	 
							</div>
						</form>		
            		</div>    
            	</div>
                <div class="row login-form" id="results">
                    <div class="col-sm-12">
	                    <form>
	                        <div class="row">
								<div class="col-sm-4 form-group">
									<h2>Minumum</h2>
									<h3 id="min"></h3>
								</div>
								<div class="col-sm-4 form-group">
									<h2>Maximum</h2>
									<h3 id="max"></h3>
								</div>
								<div class="col-sm-4 form-group">
									<h2>Median</h2>
									<h3 id="med"></h3>
								</div>
							</div>
							<div class="row">
								<div class="col-sm-4 col-sm-offset-2 form-group">
									<h2>Average</h2>
									<h3 id="mean"></h3>
								</div>
								<div class="col-sm-4 col-sm-offset-0 form-group">
									<h2>Range</h2>
									<h3 id="range"></h3>
								</div>
	                        </div>
							<button class="btn btn-danger show-register-form">New numbers?</button>   
						</form>
                    </div>	 
				</div>
            </div>      
        </div>

        <!-- Footer -->
        <footer>
        	<div class="container">
        		<div class="row">
        			<div class="col-sm-8 col-sm-offset-2">
        				<div class="footer-border"></div>
        				<p> &copy; Ian's Number Gen 2023</p>
        			</div>	
        		</div>
        	</div>
        </footer>

        <!-- Javascript -->
        <script src="js/jquery-1.11.1.min.js"></script>
        <script src="bootstrap/js/bootstrap.min.js"></script>
        <script src="js/jquery.backstretch.min.js"></script>
        <script src="js/scripts.js"></script>
        <script src="js/math.js"></script>

</body>

</html>
